<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Meta Agent</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>AI Meta Agent</h1>
        <p>配表 patch、diff、校验、回滚和习惯沉淀</p>
      </div>
      <div class="status" id="status">Ready</div>
    </header>

    <main class="layout">
      <section class="panel input-panel">
        <div class="section-title">
          <h2>输入</h2>
          <button id="loadSample" type="button">示例</button>
        </div>

        <label>
          规划表 Excel
          <input id="planningFile" type="file" accept=".xlsx,.xlsm" />
        </label>

        <label>
          配置表 Excel
          <input id="configFile" type="file" accept=".xlsx,.xlsm" />
        </label>

        <label>
          配置表名
          <input id="configTableName" value="shop_pack_config" />
        </label>

        <label>
          Manifest
          <textarea id="manifestText" spellcheck="false"></textarea>
        </label>

        <div class="actions">
          <button id="analyzeBtn" type="button">Analyze</button>
          <button id="draftBtn" type="button">Draft</button>
          <button id="applyBtn" type="button">Apply Preview</button>
          <button id="learnBtn" type="button">Learn</button>
        </div>
      </section>

      <section class="panel review-panel">
        <div class="tabs">
          <button class="tab active" data-tab="patch">Patch</button>
          <button class="tab" data-tab="result">Result</button>
          <button class="tab" data-tab="raw">Raw</button>
        </div>

        <div id="patchTab" class="tab-content active">
          <textarea id="patchText" spellcheck="false"></textarea>
        </div>
        <div id="resultTab" class="tab-content">
          <pre id="resultText"></pre>
        </div>
        <div id="rawTab" class="tab-content">
          <pre id="rawText"></pre>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
