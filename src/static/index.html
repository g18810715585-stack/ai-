<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI 配表代理人</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>AI 配表代理人</h1>
        <p>读取规划表，生成可审核的配置变更、预览表、校验报告和习惯记录</p>
      </div>
      <div class="status" id="status">就绪</div>
    </header>

    <main class="layout">
      <section class="panel input-panel">
        <div class="section-title">
          <h2>输入</h2>
          <button id="loadSample" type="button">示例</button>
        </div>

        <label>
          规划表 Excel
          <input id="planningFile" type="file" accept=".xlsx,.xlsm" />
        </label>

        <label>
          飞书规划链接（文档/表格）
          <input id="planningFeishuUrl" type="url" placeholder="粘贴飞书文档、知识库表格或电子表格链接" />
        </label>

        <label>
          配置表目录（推荐）
          <input id="configDir" placeholder="例如 C:\TopHero\Meta\meta_local" />
        </label>

        <label>
          单张配置表 Excel（可选）
          <input id="configFile" type="file" accept=".xlsx,.xlsm" />
        </label>

        <label>
          目标配置表名（sheet 名）
          <input id="configTableName" placeholder="填写真实 sheet 名，例如 activity" />
        </label>

        <label>
          运行配置 Manifest
          <textarea id="manifestText" spellcheck="false"></textarea>
        </label>

        <div class="mode-row">
          <div>
            <div class="mode-title">草案生成方式</div>
            <div class="mode-help" id="aiStatusText">正在检查真实 AI 配置</div>
          </div>
          <div class="mode-controls">
            <select id="aiProvider" aria-label="AI 服务商">
              <option value="chatgpt">ChatGPT</option>
              <option value="gemini">Gemini</option>
              <option value="claude">Claude</option>
              <option value="deepseek_v4_pro">DeepSeek</option>
            </select>
            <div class="segmented" role="group" aria-label="草案生成方式">
              <button class="segment active" data-ai-mode="stub" type="button">本地草案</button>
              <button class="segment" data-ai-mode="real" type="button">真实 AI</button>
            </div>
          </div>
        </div>

        <div class="actions">
          <button id="schemaScanBtn" type="button">扫描配置目录</button>
          <button id="analyzeBtn" type="button">分析表格</button>
          <button id="draftBtn" type="button">生成草案</button>
          <button id="applyBtn" type="button">生成预览</button>
          <button id="learnBtn" type="button">记录习惯</button>
        </div>
      </section>

      <section class="panel review-panel">
        <div class="tabs">
          <button class="tab active" data-tab="patch">变更 Patch</button>
          <button class="tab" data-tab="result">执行结果</button>
          <button class="tab" data-tab="raw">原始响应</button>
        </div>

        <div id="patchTab" class="tab-content active">
          <textarea id="patchText" spellcheck="false"></textarea>
        </div>
        <div id="resultTab" class="tab-content">
          <pre id="resultText"></pre>
        </div>
        <div id="rawTab" class="tab-content">
          <pre id="rawText"></pre>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
